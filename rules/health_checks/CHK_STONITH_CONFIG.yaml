# CHK_STONITH_CONFIG - Verify STONITH/fencing is enabled
check_id: CHK_STONITH_CONFIG
version: "1.0"
severity: CRITICAL
description: Verify STONITH/fencing is enabled and configured
enabled: true
optional: true  # Fencing optional in non-strict mode (lab/test environments)

source_definitions:
  live_cmd: "pcs property show stonith-enabled 2>/dev/null; echo '---'; pcs status 2>/dev/null | grep -iE 'stonith|fence'"
  sos_path: "sos_commands/pacemaker/crm_mon_-1"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: stonith_enabled
      regex: "stonith-enabled:\\s*true"
      group: 0
    - name: stonith_disabled
      regex: "stonith-enabled:\\s*false"
      group: 0
    - name: stonith_resource
      regex: "(stonith:|fence_)"
      group: 0
    - name: stonith_started
      regex: "(stonith|fence).*Started"
      group: 0

validation_logic:
  scope: cluster  # STONITH config is cluster-wide
  expectations:
    - key: stonith_disabled
      operator: not_exists
      value: true
      message: "STONITH is disabled - split-brain protection not active"
    - key: stonith_resource
      operator: exists
      value: true
      message: "No STONITH/fencing resources configured"
