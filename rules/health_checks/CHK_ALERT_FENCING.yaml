# CHK_ALERT_FENCING - Validate SAPHanaSR-alert-fencing
check_id: CHK_ALERT_FENCING
version: "1.0"
severity: WARNING
description: Validate SAPHanaSR alert and fencing configuration
enabled: true

source_definitions:
  # Check for alert and fencing configuration - supports both pcs (RHEL) and crm (SUSE)
  live_cmd: |
    # Try pcs first (RHEL)
    if command -v pcs >/dev/null 2>&1; then
      echo "=== ALERTS ==="
      pcs alert config 2>/dev/null || echo "NO_ALERTS"
      echo "=== FENCING ==="
      pcs stonith status 2>/dev/null
      pcs stonith config 2>/dev/null | head -20
    # Try crm (SUSE)
    elif command -v crm >/dev/null 2>&1; then
      crm configure show 2>/dev/null | grep -E 'alert|fence'
    else
      echo "NO_CLUSTER_TOOLS"
    fi
  sos_path: "sos_commands/pacemaker/crm_configure_show"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: alert_config
      regex: "(Alerts:|alert|SAPHanaSR-alert)"
      group: 0
    - name: fence_config
      regex: "(stonith|fence_|fencing-topology|Started)"
      group: 0
    - name: no_alerts
      regex: "NO_ALERTS"
      group: 0

validation_logic:
  scope: cluster  # Alert config is cluster-wide
  expectations: []
  # Informational - alerts are optional but recommended for SAP HANA clusters
